  <script>
    // ajustar altura del iframe dinamicamente al contenido (cuando esta del mismo dominio)
    (function() {
      const iframe = document.querySelector('iframe');
      if (!iframe) return;
      iframe.addEventListener('load', function() {
        try {
          // mismo origen - acceso al document
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          if (!doc) return;
          setTimeout(function() {
            const target = doc.querySelector('section.embed-target');
            if (target) {
              const h = target.scrollHeight + 60;
              iframe.style.minHeight = h + 'px';
            }
          }, 1500);
        } catch (e) {
          // cross-origin: ignorar
        }
      });
    })();
  </script>
