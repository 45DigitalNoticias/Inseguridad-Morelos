<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Redirigiendo · 45 Digital Noticias · Inseguridad Morelos</title>
<meta name="description" content="El dashboard municipal vive ahora en /municipios/. Redirigiendo automáticamente.">
<link rel="canonical" href="municipios/index.html">
<script>
  // Compatibilidad con links viejos del tipo municipio.html?id=cuernavaca
  (function() {
    const params = new URLSearchParams(window.location.search);
    const id = (params.get('id') || '').toLowerCase().trim();
    const map = {
      'cuernavaca': 'cuernavaca',
      'cuautla': 'cuautla',
      'jiutepec': 'jiutepec',
      'temixco': 'temixco',
      'yautepec': 'yautepec',
      'jojutla': 'jojutla',
      'emiliano-zapata': 'emiliano-zapata',
      'xochitepec': 'xochitepec',
      'tepoztlan': 'tepoztlan',
      'huitzilac': 'huitzilac',
      'tlaltizapan': 'tlaltizapan'
    };
    const dest = (id && map[id]) ? ('municipios/' + map[id] + '.html') : 'municipios/index.html';
    window.location.replace(dest);
  })();
</script>
<meta http-equiv="refresh" content="0; url=municipios/index.html">
