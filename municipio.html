<link rel="canonical" href="municipios/index.html">
<script>
  // Compatibilidad con links viejos del tipo municipio.html?id=cuernavaca
  (function() {
    const params = new URLSearchParams(window.location.search);
    const id = (params.get('id') || '').toLowerCase().trim();
    const map = {
      'cuernavaca': 'cuernavaca',
      'cuautla': 'cuautla',
      'jiutepec': 'jiutepec',
      'temixco': 'temixco',
      'yautepec': 'yautepec',
      'jojutla': 'jojutla',
      'emiliano-zapata': 'emiliano-zapata',
      'xochitepec': 'xochitepec',
      'tepoztlan': 'tepoztlan',
      'huitzilac': 'huitzilac',
      'tlaltizapan': 'tlaltizapan'
    };
    const dest = (id && map[id]) ? ('municipios/' + map[id] + '.html') : 'municipios/index.html';
    window.location.replace(dest);
  })();
</script>

<style>
#ck-consent{position:fixed;left:16px;right:16px;bottom:16px;z-index:9999;max-width:560px;margin:0 auto;background:#0e1320;border:1px solid rgba(204,161,90,.35);border-radius:12px;padding:16px 18px;box-shadow:0 18px 50px rgba(0,0,0,.5);font-family:'Inter',system-ui,sans-serif;color:#cdd3cc;display:none}
#ck-consent.show{display:block}
#ck-consent p{margin:0 0 12px;font-size:.86rem;line-height:1.5}
#ck-consent a{color:#ecc77f;text-decoration:underline}
#ck-consent .ck-row{display:flex;gap:10px;flex-wrap:wrap}
#ck-consent button{font:inherit;font-size:.82rem;font-weight:600;cursor:pointer;border-radius:999px;padding:8px 18px;border:1px solid rgba(204,161,90,.5);background:transparent;color:#ecc77f;transition:.2s}
#ck-consent button.ck-ok{background:#cca15a;border-color:#cca15a;color:#0e1320}
#ck-consent button:hover{filter:brightness(1.08)}
</style>
<div id="ck-consent-init" hidden></div>
<div id="ck-consent" role="dialog" aria-label="Aviso de cookies">
  <p>Usamos cookies de Google Analytics para medir la audiencia y mejorar el sitio. Puedes aceptarlas o rechazarlas. Mas detalles en nuestro <a href="https://45digitalnoticias.github.io/columnas/privacidad.html">Aviso de privacidad</a>.</p>
  <div class="ck-row">
    <button class="ck-ok" data-ck-ok type="button">Aceptar</button>
    <button data-ck-no type="button">Rechazar</button>
  </div>
</div>
<script>
(function(){
  var b=document.getElementById('ck-consent');
  if(!b)return;
  if(!localStorage.getItem('cookie-consent')){b.classList.add('show');}
  function set(v){
    try{localStorage.setItem('cookie-consent',v);}catch(e){}
    if(v==='granted'&&typeof gtag==='function'){gtag('consent','update',{'analytics_storage':'granted'});}
    b.classList.remove('show');
  }
  var ok=b.querySelector('[data-ck-ok]'),no=b.querySelector('[data-ck-no]');
  if(ok)ok.addEventListener('click',function(){set('granted');});
  if(no)no.addEventListener('click',function(){set('denied');});
})();
</script>
<!-- /Cookie consent 45 Digital -->
